name: Upload Artifact

on:
  workflow_dispatch:

jobs:
  artifact:
    runs-on: ubuntu-latest

    steps:
      - name: Create report
        run: |
          mkdir reports
          echo "CI Passed Successfully" > reports/report.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/report.txt
