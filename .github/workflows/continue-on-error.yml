name: Continue on Error Demo

on:
  workflow_dispatch:

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      - name: Step 1 - Success
        run: echo "This step succeeds."

      - name: Step 2 - Intentional Failure
        continue-on-error: true
        run: |
          echo "This step will fail."
          exit 1

      - name: Step 3 - Still Runs
        run: echo "Workflow continued because continue-on-error is true."
