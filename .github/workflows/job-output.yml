name: Job Outputs

on:
  workflow_dispatch:

jobs:
  generate-date:
    runs-on: ubuntu-latest

    outputs:
      today: ${{ steps.date.outputs.today }}

    steps:
      - name: Generate Date
        id: date
        run: echo "today=$(date)" >> $GITHUB_OUTPUT

  print-date:
    needs: generate-date
    runs-on: ubuntu-latest

    steps:
      - name: Print Date
        run: |
          echo "Today's Date:"
          echo "${{ needs.generate-date.outputs.today }}"
